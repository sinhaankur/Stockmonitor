name: Deploy GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and deploy app to gh-pages
        env:
          GH_PAGES_REPO: Stockmonitor
          GH_PAGES_BASE_PATH: /Stockmonitor/
        run: npm run deploy:gh-pages
