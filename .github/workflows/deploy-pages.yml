name: Deploy GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Astro (blog-site) requires Node >=22.12; matches the repo's .nvmrc.
          node-version: '22'
          cache: npm

      - name: Install dependencies
        # Use `npm ci` for a clean, reproducible install, but fall back to
        # `npm install` if the lockfile can't be reconciled on the Linux runner
        # (optional native peer deps like utf-8-validate resolve differently
        # across platforms). The deploy script itself also uses `npm install`.
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Build and deploy app to gh-pages
        env:
          GH_PAGES_REPO: Stockmonitor
          GH_PAGES_BASE_PATH: /Stockmonitor/
        run: npm run deploy:gh-pages
